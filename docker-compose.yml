services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Not used for local dev right now — the app runs via a venv locally
  # (see README.md). Kept for CI/deploy (Phase 2), where it's the actual
  # deployed artifact. POSTGRES_HOST is fixed to the service name here,
  # overriding the venv-oriented "localhost" default from .env, since this
  # container reaches postgres over the compose network, not the host.
  api:
    build: ./backend
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "${API_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
