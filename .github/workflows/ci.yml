name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scriptorium
          POSTGRES_PASSWORD: scriptorium
          POSTGRES_DB: scriptorium
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scriptorium"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: scriptorium
      POSTGRES_PASSWORD: scriptorium
      POSTGRES_DB: scriptorium
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      JWT_SECRET_KEY: test-only-secret-not-used-in-production
      OPENSEARCH_HOST: localhost
      OPENSEARCH_PORT: 9200
      API_HOST: localhost
      API_PORT: 8000
      # Isolated from any real index namespace — same reasoning as scriptorium_test
      # for Postgres above (tests create/delete indices, never touch dev data).
      OPENSEARCH_INDEX_PREFIX: ci_test_

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "./backend[dev]"
      - run: ruff check backend/
      - run: ruff format --check backend/
      - run: alembic -c backend/alembic.ini upgrade head
      - name: Start OpenSearch
        # GitHub Actions' native `services:` containers can only reference a
        # pre-built image, not a build context — analysis-icu requires
        # extending the base image (see opensearch/Dockerfile), so this reuses
        # the same docker-compose.yml/Dockerfile as local dev instead of
        # duplicating the setup as a second image definition.
        run: |
          docker compose up -d --build opensearch
          timeout 120 sh -c 'until curl -sf http://localhost:9200/_cluster/health >/dev/null; do sleep 3; done'
      - run: pytest backend/tests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
