name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host jump
            HostName ${{ vars.JUMP_HOST }}
            User ${{ vars.JUMP_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
          Host target
            HostName ${{ vars.TARGET_HOST }}
            User ${{ vars.TARGET_USER }}
            Port ${{ vars.TARGET_PORT }}
            IdentityFile ~/.ssh/deploy_key
            ProxyJump jump
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config
      - name: Sync repo to server
        run: >-
          rsync -az --delete --exclude '.git' --exclude '.env'
          -e "ssh -F ~/.ssh/config" ./ target:${{ vars.DEPLOY_PATH }}/
      - name: Build and start containers
        run: ssh -F ~/.ssh/config target "cd ${{ vars.DEPLOY_PATH }} && docker compose up -d --build"
      - name: Run migrations
        run: ssh -F ~/.ssh/config target "cd ${{ vars.DEPLOY_PATH }} && docker compose exec -T api alembic upgrade head"
